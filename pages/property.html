<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property View — Mikhail Holdings Ltd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            padding-top: 120px;
        }

        @media (max-width: 768px) {
            body {
                padding-top: 70px;
            }
        }
    </style>
</head>

<body>
    <!-- Header Include -->
    <div id="header-placeholder"></div>

    <!-- Banner Section (Tailwind utilities only) -->
    <section class="w-full overflow-hidden">
        <div class="relative w-full h-full">
            <img src="../public/home_bg.jpg" alt="Property Listing" class="w-full h-full object-cover object-center">
            <div class="absolute inset-0 flex items-center justify-center">
                <h1
                    class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-white uppercase tracking-wide text-center max-w-4xl px-4">
                    Property Details</h1>
            </div>
        </div>
    </section>

    <main id="property-page" class="property-detail-page">
        <section id="property-detail" class="section">
            <div class="property-placeholder reveal">
                Loading property content...
            </div>
        </section>
    </main>

    <script src="../js/property-data.js"></script>
    <script src="../js/property-page.js"></script>
    <script src="../js/loader.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
