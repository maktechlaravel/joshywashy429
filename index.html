<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mikhail Holdings Ltd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="pt-16 md:pt-28">
    <!-- Header Include -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main>
        <!-- Banner Section (Tailwind utilities only) -->
        <section class="w-full overflow-hidden">
            <div class="relative w-full h-full">
                <img src="public/home_bg.jpg" alt="Commercial, Residential and Industrial Developers"
                    class="w-full h-full object-cover object-center">
                <div class="absolute inset-0 flex items-center justify-center">
                    <h1
                        class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-white uppercase tracking-wide text-center max-w-6xl px-4">
                        Commercial, Residential and Industrial Developers</h1>
                </div>
            </div>
        </section>

        <!-- Company Structure Section -->
        <section class="company-structure">
            <div class="container">
                <h2 class="section-title">Company Structure</h2>
                <div class="divisions-grid">
                    <a href="pages/realestate.html" class="division-card">
                        <span class="division-name">REAL ESTATE</span>
                    </a>
                    <a href="pages/manufacturing.html" class="division-card">
                        <span class="division-name">MANUFACTURING</span>
                    </a>
                    <a href="pages/rnd.html" class="division-card">
                        <span class="division-name">RESEARCH & DEVELOPMENT</span>
                    </a>
                    <a href="pages/retail.html" class="division-card">
                        <span class="division-name">RETAIL/CONSUMER DEVELOPMENT</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Include -->
    <div id="footer-placeholder"></div>

    <script>
        // Load Header
        fetch('includes/header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);

        // Load Footer
        fetch('includes/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>

</html>
