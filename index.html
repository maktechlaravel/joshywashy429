<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mikhail Holdings Ltd</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            padding-top: 120px;
        }

        @media (max-width: 768px) {
            body {
                padding-top: 70px;
            }
        }
    </style>
</head>

<body>
    <!-- Header Include -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main>
        <!-- Banner Section -->
        <section class="banner">
            <img src="public/home_bg.jpg" alt="Commercial, Residential and Industrial Developers" class="banner-img">
            <div class="banner-overlay">
                <h1 class="banner-title">Commercial, Residential and Industrial Developers</h1>
            </div>
        </section>

        <!-- Company Structure Section -->
        <section class="company-structure">
            <div class="container">
                <h2 class="section-title">Company Structure</h2>
                <div class="divisions-grid">
                    <a href="pages/realestate.html" class="division-card">
                        <span class="division-name">REAL ESTATE</span>
                    </a>
                    <a href="pages/manufacturing.html" class="division-card">
                        <span class="division-name">MANUFACTURING</span>
                    </a>
                    <a href="pages/rnd.html" class="division-card">
                        <span class="division-name">RESEARCH & DEVELOPMENT</span>
                    </a>
                    <a href="pages/retail.html" class="division-card">
                        <span class="division-name">RETAIL/CONSUMER DEVELOPMENT</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Include -->
    <div id="footer-placeholder"></div>

    <script>
        // Load Header
        fetch('includes/header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);

        // Load Footer
        fetch('includes/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>

</html>
